openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: FTP VPN API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: subscription
    description: Subscription management
  - name: configs
    description: VPN configuration files
  - name: payments
    description: Payment operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with license key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscription:
    get:
      operationId: getSubscription
      tags: [subscription]
      summary: Get subscription details
      responses:
        "200":
          description: Subscription info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscription/plans:
    get:
      operationId: getPlans
      tags: [subscription]
      summary: Get available plans
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlansResponse"

  /configs:
    get:
      operationId: getConfigs
      tags: [configs]
      summary: Get user VPN configs
      responses:
        "200":
          description: List of configs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /configs/{location}/download:
    get:
      operationId: downloadConfig
      tags: [configs]
      summary: Download WireGuard config file for a location
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
            enum: [NL, DE, FI, FR, US]
      responses:
        "200":
          description: Config file content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigDownload"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Subscription inactive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/cryptobot/invoice:
    post:
      operationId: createCryptoBotInvoice
      tags: [payments]
      summary: Create CryptoBot USDT invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "200":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/sbp/qr:
    post:
      operationId: createSbpQr
      tags: [payments]
      summary: Create SBP QR code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "200":
          description: SBP QR created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SbpResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/status/{invoiceId}:
    get:
      operationId: getPaymentStatus
      tags: [payments]
      summary: Check payment status
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentStatus"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [subscription]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    LoginRequest:
      type: object
      properties:
        licenseKey:
          type: string
          description: License key in format XXXX-XXXX-XXXX-XXXX
      required: [licenseKey]

    LoginResult:
      type: object
      properties:
        success:
          type: boolean
        licenseKey:
          type: string
        subscription:
          $ref: "#/components/schemas/Subscription"
      required: [success, licenseKey, subscription]

    UserInfo:
      type: object
      properties:
        licenseKey:
          type: string
        subscription:
          $ref: "#/components/schemas/Subscription"
      required: [licenseKey, subscription]

    Subscription:
      type: object
      properties:
        id:
          type: integer
        licenseKey:
          type: string
        plan:
          type: string
          enum: [start, standard, pro, demo]
        status:
          type: string
          enum: [active, expired, pending]
        expiresAt:
          type: string
          nullable: true
        configsCount:
          type: integer
        createdAt:
          type: string
      required: [id, licenseKey, plan, status, configsCount, createdAt]

    Plan:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        days:
          type: integer
        price:
          type: number
        currency:
          type: string
        priceUsdt:
          type: number
        description:
          type: string
        popular:
          type: boolean
      required: [id, name, days, price, currency, priceUsdt, description, popular]

    PlansResponse:
      type: object
      properties:
        plans:
          type: array
          items:
            $ref: "#/components/schemas/Plan"
      required: [plans]

    VpnConfig:
      type: object
      properties:
        location:
          type: string
        locationName:
          type: string
        flag:
          type: string
        server:
          type: string
        status:
          type: string
          enum: [available, unavailable]
      required: [location, locationName, flag, server, status]

    ConfigsResponse:
      type: object
      properties:
        configs:
          type: array
          items:
            $ref: "#/components/schemas/VpnConfig"
        total:
          type: integer
      required: [configs, total]

    ConfigDownload:
      type: object
      properties:
        location:
          type: string
        filename:
          type: string
        content:
          type: string
      required: [location, filename, content]

    CreateInvoiceRequest:
      type: object
      properties:
        planId:
          type: string
      required: [planId]

    InvoiceResponse:
      type: object
      properties:
        invoiceId:
          type: string
        payUrl:
          type: string
        amount:
          type: number
        currency:
          type: string
        expiresAt:
          type: string
      required: [invoiceId, payUrl, amount, currency, expiresAt]

    SbpResponse:
      type: object
      properties:
        invoiceId:
          type: string
        qrCode:
          type: string
          description: Base64 QR code image or URL
        amount:
          type: number
        expiresAt:
          type: string
        phone:
          type: string
        bank:
          type: string
      required: [invoiceId, qrCode, amount, expiresAt, phone, bank]

    PaymentStatus:
      type: object
      properties:
        invoiceId:
          type: string
        status:
          type: string
          enum: [pending, paid, expired, failed]
        paidAt:
          type: string
          nullable: true
      required: [invoiceId, status]

    DashboardStats:
      type: object
      properties:
        daysRemaining:
          type: integer
        configsAvailable:
          type: integer
        locationsCount:
          type: integer
        totalDownloads:
          type: integer
        isActive:
          type: boolean
      required: [daysRemaining, configsAvailable, locationsCount, totalDownloads, isActive]
